idea:
  title: Mechanistic Interpretability of Tool Selection in LLMs
  domain: artificial_intelligence
  hypothesis: 'LLMs increasingly use tools (search, code execution, APIs), but we
    have no mechanistic understanding of how they decide which tool to call. Existing
    agent benchmarks treat selection as a black box, measuring success/failure without
    explaining the decision.

    What representations drive tool choice? Is it semantic matching between tool descriptions
    and queries, or learned heuristics? Do models have dedicated "routing" circuits,
    or is selection distributed? Understanding this seems important as to...'
  background:
    description: 'LLMs increasingly use tools (search, code execution, APIs), but
      we have no mechanistic understanding of how they decide which tool to call.
      Existing agent benchmarks treat selection as a black box, measuring success/failure
      without explaining the decision.

      What representations drive tool choice? Is it semantic matching between tool
      descriptions and queries, or learned heuristics? Do models have dedicated "routing"
      circuits, or is selection distributed? Understanding this seems important as
      tool-using agents become more prevalent since selection errors cause cascading
      failures and we currently can''t predict or debug them.'
